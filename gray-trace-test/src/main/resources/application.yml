server:
  port: 8080

spring:
  application:
    name: gray-trace-test

# ── 灰度追踪配置 ─────────────────────────────────────────
gray:
  trace:
    enabled: true
    servlet:
      enabled: true
    rest-template:
      enabled: false    # ← 关闭：验证开关是否生效
    ok-http:
      enabled: true
    http-client:
      enabled: true
    feign:
      enabled: true
    thread-pool:
      enabled: true
      async-decorator: true
    mq:
      enabled: false     # MQ 默认关闭；本地测试无 RocketMQ Broker，保持 false
      producer: true
      consumer: true
    web-flux:
      enabled: false     # 当前为 MVC 项目，关闭

logging:
  level:
    io.tracemark: DEBUG